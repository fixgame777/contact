<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📅 DATE FIX 777 · contact</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1e1f2b, #0c0d16);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .glass-card {
            max-width: 1200px;      /* slightly larger to accommodate bigger images */
            width: 100%;
            background: rgba(20, 22, 36, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 3.5rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.1) inset;
        }

        /* headline */
        .hero-title {
            text-align: center;
            font-size: clamp(2.2rem, 8vw, 4.2rem);
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(145deg, #f9e281, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 15px #ffb34760, 0 0 40px #ff7b00;
        }

        .hero-title span {
            font-weight: 700;
            background: linear-gradient(145deg, #ffffff, #ffe18a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 12px gold);
        }

        .sub-glow {
            text-align: center;
            color: #b9b9d3;
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 2.5rem;
            border-bottom: 1px dashed #f0b34b50;
            padding-bottom: 1rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* image duo — larger now */
        .image-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            margin: 2rem 0 2.5rem 0;
        }

        .image-panel img {
            width: min(380px, 100%);   /* significantly bigger, up to 380px */
            height: auto;               /* keep original proportions, no forced square */
            border-radius: 2.5rem;
            box-shadow: 0 25px 40px -10px black, 0 0 0 2px rgba(255, 200, 70, 0.4), 0 0 30px #ffae0060;
            transition: 0.25s ease-in-out;
            background: linear-gradient(145deg, #2f2f42, #1a1b28);
            padding: 0.35rem;
            object-fit: cover;          /* covers the area, but respects ratio */
        }

        .image-panel img:hover {
            transform: scale(1.03) rotate(0.5deg);
            box-shadow: 0 35px 55px -10px #000, 0 0 0 3px #ffc107, 0 0 45px #ffcc33;
        }

        /* action buttons */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin: 2.8rem 0 2rem;
        }

        .btn {
            border: none;
            background: rgba(18, 20, 33, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.2rem 2.5rem;
            border-radius: 4rem;
            font-weight: 600;
            font-size: 1.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            color: white;
            border: 1.5px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            flex: 1 1 240px;
            min-width: 240px;
            box-shadow: 0 12px 30px -8px #00000080;
        }

        .btn i {
            font-size: 2rem;
        }

        .btn-telegram {
            background: linear-gradient(125deg, #1c2a44, #0e1a2b);
            border-color: #2aa2d4;
        }

        .btn-telegram:hover {
            background: linear-gradient(125deg, #235b8c, #0e2f4b);
            border-color: #6ec3ff;
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -8px #0088cc, 0 0 0 2px #8fcbff;
        }

        .btn-whatsapp {
            background: linear-gradient(145deg, #1f3b2c, #0e2a1a);
            border-color: #25d366;
        }

        .btn-whatsapp:hover {
            background: linear-gradient(145deg, #1f7943, #175c30);
            border-color: #98f0b2;
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -8px #25d366, 0 0 0 2px #b7f9cf;
        }

        .btn-call {
            background: linear-gradient(145deg, #352c1f, #221d12);
            border-color: #ffae42;
            font-size: 1.3rem;
            padding: 0.7rem 1.8rem;
        }

        .btn-call:hover {
            background: linear-gradient(145deg, #5f4b28, #3e311b);
            border-color: #ffc285;
            transform: scale(1.02);
            box-shadow: 0 0 25px #f5b042;
        }

        .whatsapp-text {
            font-size: 1.2rem;
            color: #d1d1e6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding: 1.2rem 1.5rem;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 60px;
            backdrop-filter: blur(8px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #ffd96660;
        }

        .whatsapp-text .phone-number {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(145deg, #fff1b8, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .or-call-divider {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            color: #c9c9e0;
            font-size: 1.3rem;
            font-weight: 400;
        }

        .fa-phone-alt {
            color: #ffb347;
        }

        .note-app {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #7f809b;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .note-app i {
            color: gold;
            margin-right: 6px;
        }

        hr {
            border: 0.5px solid #ffd96630;
            margin: 2rem 0 0.5rem;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
        }

        /* mobile fine-tune */
        @media (max-width: 600px) {
            .glass-card {
                padding: 2rem 1.2rem;
                border-radius: 2.5rem;
            }
            .btn {
                font-size: 1.2rem;
                padding: 1rem 1.5rem;
            }
            .image-panel img {
                width: 100%;           /* full width on small screens, still large */
                max-width: 340px;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- main headline -->
        <div class="hero-title">
            WELCOME <span>DATE FIX 777</span>
        </div>
        <div class="sub-glow">
            <i class="fas fa-star" style="color: #ffc107; margin-right: 8px;"></i> 
            your premium contact zone 
            <i class="fas fa-star" style="color: #ffc107; margin-left: 8px;"></i>
        </div>

        <!-- two images – now bigger, join telegram line removed -->
        <div class="image-panel">
            <img src="https://i.imgur.com/0hJWpq5.png" alt="date fix 777 visual 1" loading="lazy">
            <img src="https://i.imgur.com/9xKKiEC.jpeg" alt="date fix 777 visual 2" loading="lazy">
        </div>

        <!-- direct action row: Telegram & WhatsApp (open in app) -->
        <div class="action-row">
            <!-- telegram direct link -->
            <a href="https://t.me/datefix777" target="_blank" rel="noopener noreferrer" class="btn btn-telegram">
                <i class="fab fa-telegram"></i> Telegram channel
            </a>
            <!-- whatsapp direct link (wa.me) -->
            <a href="https://wa.me/919113224019?text=Hello%20DATE%20FIX%20777%2C%20I'm%20interested%20in%20your%20service" target="_blank" rel="noopener noreferrer" class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp chat
            </a>
        </div>

        <!-- WhatsApp number + OR CALL section exactly as requested -->
        <div class="whatsapp-text">
            <i class="fab fa-whatsapp" style="font-size: 2rem; color: #25d366; filter: drop-shadow(0 0 12px #25d366);"></i>
            <span class="phone-number">+919113224019</span>
            <span class="or-call-divider">
                <span style="font-size: 1.5rem; color: #ffe087;">⚡</span> OR CALL <span style="font-size: 1.5rem; color: #ffe087;">⚡</span>
            </span>
            <!-- direct call button (tel: for mobile / pc fallback) -->
            <a href="tel:+919113224019" class="btn btn-call" style="flex: 0 1 auto;">
                <i class="fas fa-phone-alt"></i> Call now
            </a>
        </div>

        <!-- extra micro info: both links open directly in app -->
        <hr>
        <div class="note-app">
            <span><i class="fas fa-check-circle"></i> Telegram opens in app</span>
            <span><i class="fas fa-check-circle"></i> WhatsApp opens in app</span>
            <span><i class="fas fa-mobile-alt"></i> One tap call</span>
        </div>

        <!-- tiny fallback links (barely visible) -->
        <div style="text-align: center; margin-top: 1.2rem; font-size: 0.9rem; opacity: 0.6; color: #b0b0d0;">
            t.me/datefix777  |  wa.me/919113224019
        </div>
    </div>
</body>
</html>
